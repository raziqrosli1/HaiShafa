<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gift</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

/* BODY */

body{

margin:0;

font-family:'Cinzel', serif;

overflow:hidden;

}

/* LOADING */

#loading{

position:fixed;

width:100%;
height:100vh;

background:#4B0F1B;

display:flex;

justify-content:center;
align-items:center;
flex-direction:column;

color:#C2A45C;

}

.loading-text{

margin-bottom:30px;

letter-spacing:3px;

}

.bar{

width:280px;

height:6px;

background:#6A1B2B;

border-radius:10px;

overflow:hidden;

}

.progress{

height:100%;

width:0%;

background:linear-gradient(
90deg,
#C2A45C,
#E4C98A
);

animation:load 9s forwards;

}

@keyframes load{

0%{width:0%;}
100%{width:100%;}

}

/* TREASURE SECTION */

#treasure{

display:none;

height:100vh;

background:linear-gradient(
135deg,
#4B0F1B,
#6A1B2B
);

color:#C2A45C;

justify-content:center;
align-items:center;
flex-direction:column;

text-align:center;

}

/* TITLE */

.treasureTitle{

font-family:'Great Vibes', cursive;

font-size:42px;

margin-bottom:30px;

}

/* TREASURE BOX */

.treasureBox{

width:150px;
height:150px;

background:linear-gradient(
145deg,
#E4C98A,
#C2A45C
);

border-radius:14px;

box-shadow:
0 15px 35px rgba(0,0,0,0.4);

cursor:pointer;

transition:0.3s;

}

.treasureBox:hover{

transform:scale(1.05);

}

/* PASSWORD CARD */

#passwordCard{

display:none;

margin-top:30px;

background:white;

padding:30px;

border-radius:14px;

border:2px solid #C2A45C;

box-shadow:
0 15px 35px rgba(0,0,0,0.3);

}

/* TEXT */

.passTitle{

color:#4B0F1B;

margin-bottom:15px;

}

/* INPUT */

#passwordInput{

padding:12px;

border-radius:8px;

border:1px solid #C2A45C;

text-align:center;

margin-bottom:15px;

}

/* BUTTON */

.unlockBtn{

padding:10px 25px;

border-radius:30px;

border:none;

background:#4B0F1B;

color:#C2A45C;

cursor:pointer;

}

/* ENVELOPE */

#envelopeSection{

display:none;

height:100vh;

background:#F5F3EF;

justify-content:center;
align-items:center;
flex-direction:column;

}

/* ENVELOPE */

.envelope{

width:320px;
height:200px;

background:#4B0F1B;

position:relative;

border-radius:8px;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

}

/* SEAL */

.seal{

width:60px;
height:60px;

background:#7A1F2E;

border-radius:50%;

position:absolute;

top:70px;
left:50%;

transform:translateX(-50%);

cursor:pointer;

}

/* LETTER */

.letter{

display:none;

width:340px;

margin-top:30px;

background:linear-gradient(
145deg,
#E4C98A,
#D6B772
);

padding:35px;

border-radius:8px;

border:2px solid #C2A45C;

box-shadow:
0 20px 40px rgba(0,0,0,0.3);

}

/* TITLE */

.letterTitle{

text-align:center;

color:#4B0F1B;

margin-bottom:15px;

}

/* SCRIPT */

.script{

font-family:'Great Vibes', cursive;

font-size:30px;

color:#4B0F1B;

text-align:center;

line-height:1.8;

}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loading-text">

Preparing your gift...

</div>

<div class="bar">

<div class="progress"></div>

</div>

</div>

<!-- TREASURE -->

<div id="treasure">

<div class="treasureTitle">

Your Treasure Awaits

</div>

<div class="treasureBox"

onclick="showPassword()">

</div>

<div id="passwordCard">

<div class="passTitle">

Enter Password

</div>

<input 
type="text"
id="passwordInput"
placeholder="Enter number">

<br>

<button class="unlockBtn"

onclick="checkPassword()">

Unlock Treasure

</button>

</div>

</div>

<!-- ENVELOPE -->

<div id="envelopeSection">

<div class="envelope">

<div class="seal"

onclick="openLetter()">

</div>

</div>

<div class="letter"

id="letter">

<div class="letterTitle">

A Small Note

</div>

<div class="script">

Happy Birthday Shafa,<br><br>

May Allah bless you<br>
with happiness,<br>
good health,<br>
and beautiful moments ahead.

</div>

</div>

</div>

<script>

/* LOADING */

setTimeout(()=>{

document.getElementById("loading")
.style.display="none";

document.getElementById("treasure")
.style.display="flex";

},9000);

/* SHOW PASSWORD */

function showPassword(){

document.getElementById("passwordCard")
.style.display="block";

}

/* PASSWORD */

let correctPassword="15";

function checkPassword(){

let input=
document.getElementById("passwordInput").value;

if(input===correctPassword){

document.getElementById("treasure")
.style.display="none";

document.getElementById("envelopeSection")
.style.display="flex";

}

else{

alert("Wrong password");

}

}

/* OPEN LETTER */

function openLetter(){

document.getElementById("letter")
.style.display="block";

}

</script>

</body>

</html>
