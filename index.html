<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gift Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

/* BODY */

body{

margin:0;

font-family:'Cinzel', serif;

background:#4B0F1B;

overflow:hidden;

}

/* LOADING */

#loading{

position:fixed;

width:100%;
height:100vh;

background:
linear-gradient(
to bottom,
#4B0F1B,
#2B0610
);

display:flex;

justify-content:center;
align-items:center;
flex-direction:column;

color:#C2A45C;

}

/* LOADING TEXT */

.loading-text{

letter-spacing:4px;

margin-bottom:30px;

font-size:16px;

animation:fadeText 2s forwards;

}

@keyframes fadeText{

0%{opacity:0;}
100%{opacity:1;}

}

/* PROGRESS BAR */

.bar{

width:300px;
height:7px;

background:#6A1B2B;

border-radius:10px;

overflow:hidden;

box-shadow:
inset 0 0 8px rgba(0,0,0,0.5);

}

.progress{

height:100%;
width:0%;

background:
linear-gradient(
90deg,
#E4C98A,
#FFF3C4,
#C2A45C
);

animation:
load 9s forwards,
shine 2s infinite;

}

@keyframes load{

0%{width:0%;}
100%{width:100%;}

}

@keyframes shine{

0%{filter:brightness(1);}
50%{filter:brightness(1.5);}
100%{filter:brightness(1);}

}

/* TREASURE */

#treasure{

display:none;

height:100vh;

justify-content:center;
align-items:center;
flex-direction:column;

text-align:center;

color:#C2A45C;

}

/* TITLE */

.title{

font-family:'Great Vibes', cursive;

font-size:48px;

margin-bottom:35px;

}

/* TREASURE BOX */

.treasureBox{

width:180px;
height:180px;

background:
linear-gradient(
145deg,
#E4C98A,
#A67C00
);

border-radius:18px;

box-shadow:
0 20px 45px rgba(0,0,0,0.6);

cursor:pointer;

transition:0.3s;

}

.treasureBox:hover{

transform:scale(1.06);

}

/* PASSWORD CARD */

#passwordCard{

display:none;

margin-top:30px;

background:white;

padding:35px;

border-radius:16px;

border:2px solid #C2A45C;

box-shadow:
0 20px 45px rgba(0,0,0,0.4);

}

/* INPUT */

#passwordInput{

padding:12px;

border-radius:10px;

border:1px solid #C2A45C;

text-align:center;

margin-bottom:15px;

font-size:16px;

}

/* BUTTON */

.unlockBtn{

padding:10px 28px;

border-radius:30px;

border:none;

background:#4B0F1B;

color:#C2A45C;

cursor:pointer;

}

/* ENVELOPE SECTION */

#envelopeSection{

display:none;

height:100vh;

background:#F5F3EF;

display:flex;

justify-content:center;
align-items:center;
flex-direction:column;

}

/* ENVELOPE */

.envelope{

width:min(90vw,520px);
height:min(55vw,320px);

background:
linear-gradient(
145deg,
#5A0F1F,
#3B0813
);

border-radius:12px;

position:relative;

box-shadow:
0 30px 70px rgba(0,0,0,0.6);

overflow:hidden;

}

/* FLAP */

.envelope::before{

content:"";

position:absolute;

top:0;

width:100%;
height:160px;

background:
linear-gradient(
145deg,
#7A1F2E,
#4B0F1B
);

clip-path:
polygon(0 0,100% 0,50% 100%);

z-index:3;

}

/* SEAL */

.seal{

width:70px;
height:70px;

background:
radial-gradient(
circle,
#E4C98A,
#A67C00
);

border-radius:50%;

position:absolute;

top:110px;
left:50%;

transform:translateX(-50%);

cursor:pointer;

box-shadow:
0 0 20px rgba(255,215,0,0.7);

z-index:5;

}

/* LETTER */

.letter{

width:min(90vw,540px);

background:
linear-gradient(
145deg,
#F2E6C9,
#E4C98A
);

padding:40px;

border-radius:10px;

border:2px solid #C2A45C;

box-shadow:
0 25px 60px rgba(0,0,0,0.4);

position:absolute;

top:-400px;

opacity:0;

transition:0.7s;

}

/* SHOW LETTER */

.letter.show{

top:280px;

opacity:1;

}

/* SCRIPT */

.script{

font-family:'Great Vibes', cursive;

font-size:34px;

text-align:center;

color:#4B0F1B;

line-height:1.8;

}

/* FRAME */

.frame{

margin-top:25px;

border:6px solid #C2A45C;

padding:15px;

border-radius:8px;

background:white;

text-align:center;

color:#4B0F1B;

font-weight:bold;

}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loading-text">

Preparing your gift...

</div>

<div class="bar">

<div class="progress"></div>

</div>

</div>

<!-- TREASURE -->

<div id="treasure">

<div class="title">

Your Treasure Awaits

</div>

<div class="treasureBox"

onclick="showPassword()">

</div>

<div id="passwordCard">

<div class="passTitle">

Enter Password

</div>

<input 
type="text"
id="passwordInput"
placeholder="Enter number">

<br>

<button class="unlockBtn"

onclick="checkPassword()">

Unlock Treasure

</button>

</div>

</div>

<!-- ENVELOPE -->

<div id="envelopeSection">

<div class="envelope">

<div class="seal"

onclick="openLetter()">

</div>

</div>

<div class="letter"

id="letter">

<div class="script">

Happy Birthday Shafa,<br><br>

May Allah bless you<br>
with happiness,<br>
good health,<br>
and beautiful moments ahead.

</div>

<div class="frame">

Someone worth celebrating

</div>

</div>

</div>

<script>

/* LOADING */

setTimeout(()=>{

document.getElementById("loading")
.style.display="none";

document.getElementById("treasure")
.style.display="flex";

},9000);

/* SHOW PASSWORD */

function showPassword(){

document.getElementById("passwordCard")
.style.display="block";

}

/* PASSWORD */

let correctPassword="15";

function checkPassword(){

let input=
document.getElementById("passwordInput").value;

if(input===correctPassword){

document.getElementById("treasure")
.style.display="none";

document.getElementById("envelopeSection")
.style.display="flex";

}

else{

alert("Wrong password");

}

}

/* LETTER DROP */

function openLetter(){

document.getElementById("letter")
.classList.add("show");

}

</script>

</body>

</html>
