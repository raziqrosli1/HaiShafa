<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heart Mission</title>

<style>

/* BODY */

body{
margin:0;
overflow:hidden;
background:#4B0F1B;
font-family:serif;
}

/* COUNTER BOX */

.counterBox{

position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);

background:white;

border:2px solid #C2A45C;

padding:12px 24px;

border-radius:12px;

font-weight:bold;

color:#4B0F1B;

box-shadow:
0 5px 15px rgba(0,0,0,0.3);

z-index:100;

}

/* HEART */

.heart{

position:absolute;

width:26px;
height:26px;

background:#E4C98A;

transform:rotate(45deg);

cursor:pointer;

box-shadow:
0 0 12px #E4C98A;

}

/* HEART SHAPE */

.heart:before,
.heart:after{

content:"";

width:26px;
height:26px;

background:#E4C98A;

border-radius:50%;

position:absolute;

}

.heart:before{
top:-13px;
left:0;
}

.heart:after{
left:-13px;
top:0;
}

</style>

</head>

<body>

<div class="counterBox" id="counter">

❤️ 0 / 15

</div>

<script>

/* SETTINGS */

let count=0;
let target=15;

/* SPAWN HEART */

function spawnHeart(){

let heart=document.createElement("div");

heart.className="heart";

/* RANDOM POSITION */

heart.style.left=Math.random()*90+"vw";

heart.style.top="-40px";

/* CLICK EVENT */

heart.onclick=function(){

heart.remove();

count++;

updateCounter();

if(count>=target){

finishGame();

}

};

/* ADD TO BODY */

document.body.appendChild(heart);

/* FALL MOTION */

let fall=setInterval(()=>{

let top=parseInt(heart.style.top);

heart.style.top=(top+2)+"px";

/* REMOVE IF OUT */

if(top>window.innerHeight){

heart.remove();

clearInterval(fall);

}

},20);

}

/* SPAWN LOOP */

setInterval(spawnHeart,800);

/* UPDATE COUNTER */

function updateCounter(){

document.getElementById("counter")

.innerHTML="❤️ "+count+" / "+target;

}

/* FINISH */

function finishGame(){

alert("Mission Complete!");

}

</script>

</body>

</html>
